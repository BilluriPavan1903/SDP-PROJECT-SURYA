<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surya Namaskar</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #e3f2fd, #ffffff);
        }

        .header {
            position: relative;
            text-align: center;
            padding: 30px 10px;
            background: linear-gradient(90deg, #ff9800, #ff5722);
            color: white;
            font-size: 32px;
            letter-spacing: 3px;
        }

        .header h1 {
            margin: 0;
        }

        .header-play {
            position: absolute;
            bottom: 10px;
            right: 15px;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: none;
            background: rgba(0,0,0,0.6);
            color: white;
            cursor: pointer;
        }

        /* 🔥 GRID LAYOUT */
        .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 per row */
            gap: 20px;
            padding: 20px;
        }

        .card {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: scale(1.03);
        }

        /* 🔥 IMAGE FIX */
        .card img {
            width: 100%;
            height: 250px;
            object-fit: contain;   /* 👈 shows full image */
            display: block;
            background: #f5f5f5;   /* optional: fills empty space */
        }

        .play-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: rgba(0,0,0,0.7);
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        .play-btn:hover {
            background: #ff5722;
        }

        /* 🔥 RESPONSIVE */
        @media (max-width: 1024px) {
            .container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .container {
                grid-template-columns: repeat(1, 1fr);
            }
        }
    </style>

</head>
<body>

    <header class="header">
        <h1>SURYA NAMASKAR</h1>
        <button class="header-play">▶</button>
    </header>

    <div class="container">
        <div class="card"><img src="{{ url_for('static', filename='Pose1-P.jpeg') }}"><a href="/asana1"><button class="play-btn">▶</button></a></div>
        <div class="card"><img src="{{ url_for('static', filename='Pose2-P.jpeg') }}"><a href="/asana2"><button class="play-btn">▶</button></a></div>
        <div class="card"><img src="{{ url_for('static', filename='Pose3-P.jpeg') }}"><a href="/asana3"><button class="play-btn">▶</button></a></div>
        <div class="card"><img src="{{ url_for('static', filename='Pose4-P.jpeg') }}"><a href="/asana4"><button class="play-btn">▶</button></a></div>
        <div class="card"><img src="{{ url_for('static', filename='Pose5-P.jpeg') }}"><a href="/asana5"><button class="play-btn">▶</button></a></div>
        <div class="card"><img src="{{ url_for('static', filename='Pose6-P.jpeg') }}"><a href="/asana6"><button class="play-btn">▶</button></a></div>
        <div class="card"><img src="{{ url_for('static', filename='Pose7-P.jpeg') }}"><a href="/asana7"><button class="play-btn">▶</button></a></div>
        <div class="card"><img src="{{ url_for('static', filename='Pose8-P.jpeg') }}"><a href="/asana8"><button class="play-btn">▶</button></a></div>
        <div class="card"><img src="{{ url_for('static', filename='Pose9-P.jpeg') }}"><a href="/asana9"><button class="play-btn">▶</button></a></div>
        <div class="card"><img src="{{ url_for('static', filename='Pose10-P.jpeg') }}"><a href="/asana10"><button class="play-btn">▶</button></a></div>
        <div class="card"><img src="{{ url_for('static', filename='Pose11-P.jpeg') }}"><a href="/asana11"><button class="play-btn">▶</button></a></div>
        <div class="card"><img src="{{ url_for('static', filename='Pose12-P.jpeg') }}"><a href="/asana12"><button class="play-btn">▶</button></a></div>
    </div>

</body>
</html>
