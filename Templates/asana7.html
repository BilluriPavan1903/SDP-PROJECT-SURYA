<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asana</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #e3f2fd, #ffffff);
}

.header {
    position: relative;
    text-align: center;
    padding: 30px 10px;
    background: linear-gradient(90deg, #ff9800, #ff5722);
    color: white;
    font-size: 32px;
    letter-spacing: 3px;
}

.header h1 {
    margin: 0;
}

.container {
    max-width: 800px;
    margin: auto;
    padding: 20px;
    text-align: center;
}

.card {
    position: relative;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    height: 500px;
}

.card img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #f5f5f5;
}

.play-btn {
    position: absolute;
    bottom: 10px;
    right: 10px;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    border: none;
    background: rgba(0,0,0,0.7);
    color: white;
    font-size: 20px;
    cursor: pointer;
}

.play-btn:hover {
    background: #ff5722;
}

iframe {
    width: 100%;
    height: 300px;
    margin-top: 15px;
    border-radius: 10px;
    border: none;
    display: none;
}

p {
    margin-top: 20px;
    font-size: 16px;
    color: #333;
    line-height: 1.6;
}

.start-btn {
    margin-top: 40px;
    padding: 12px 25px;
    font-size: 18px;
    background: #ff5722;
    color: white;
    border: none;
    border-radius: 25px;
    cursor: pointer;
}

.start-btn:hover {
    background: #e64a19;
}

.prev-btn,
.next-btn {
    position: absolute;
    top: 10px;
    padding: 10px 16px;
    background: #ff5722;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
}

.prev-btn { left: 10px; }
.next-btn { right: 10px; }

.prev-btn:hover,
.next-btn:hover {
    background: #e64a19;
}
</style>
</head>

<body>

<header class="header">
    <h1>Bhujangasana</h1>
</header>

<div class="container">

    <div class="card">
        <img src="{{ url_for('static', filename='Pose7-P.jpeg') }}">

        <a href="/asana6">
            <button class="prev-btn">Previous</button>
        </a>

        <a href="/asana8">
            <button class="next-btn">Next</button>
        </a>

        <button class="play-btn" onclick="playVideo()">▶</button>
    </div>

    <iframe 
        id="videoFrame" 
        
        allowfullscreen>
    </iframe>

    <p>
        Suryanamaskar is a powerful sequence of yoga poses that helps improve flexibility, strength, and overall well-being.
    </p>

    <button class="start-btn" onclick="startPractice()">Start Your Practice</button>

    <!-- ✅ CAMERA STREAM ADDED -->
    <div id="cameraContainer" style="display:none; margin-top:20px;">
        <h3>Live Practice</h3>
        <img id="cameraFeed" width="100%" style="border-radius:10px;">
    </div>

    <!-- ✅ RESULT BOX -->
<div id="resultBox" style="
    display:none;
    margin-top:20px;
    padding:20px;
    background:#ffffff;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
">
    <h2>Session Result</h2>
    <p id="accuracyText">Accuracy: --</p>
    <p id="holdText">Hold Time: --</p>
</div>


    
</div>

</div>

<script>
function playVideo() {
    var frame = document.getElementById("videoFrame");

    // ✅ SET VIDEO ONLY WHEN CLICKED
    frame.src = "{{ url_for('static', filename='pose 7.mp4') }}";

    frame.style.display = "block";
}

// ✅ Pose 1 fixed
function startPractice() {

    const poseId = 7;   // 🔥 THIS IS THE ONLY IMPORTANT LINE

    // Reset result
    document.getElementById("accuracyText").innerText = "Accuracy: --";
    document.getElementById("holdText").innerText = "Hold Time: --";

    // Show camera
    document.getElementById("cameraContainer").style.display = "block";

    // ✅ Pass pose ID to backend
    document.getElementById("cameraFeed").src =
        "http://127.0.0.1:5000/video?pose=" + poseId;

    // Hide result
    document.getElementById("resultBox").style.display = "none";

    // Scroll
    window.scrollTo({
        top: document.body.scrollHeight,
        behavior: 'smooth'
    });

    let interval = setInterval(() => {

        fetch("http://127.0.0.1:5000/get_result")
        .then(res => res.json())
        .then(data => {

            if (data.completed) {

                clearInterval(interval);

                // Stop camera
                document.getElementById("cameraFeed").src = "";

                // Hide camera
                document.getElementById("cameraContainer").style.display = "none";

                // Show result
                document.getElementById("resultBox").style.display = "block";

                document.getElementById("accuracyText").innerText =
                    "Accuracy: " + data.accuracy + "%";

                document.getElementById("holdText").innerText =
                    "Hold Time: " + data.hold_time + " sec";

                document.getElementById("resultBox").scrollIntoView({
                    behavior: "smooth"
                });
            }
        })
        .catch(err => console.log(err));

    }, 2000);
}
</script>

</body>
</html>
